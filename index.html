<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Пазлы — Собери картинку!</title>
    <link rel="stylesheet" href="style.css">
    <!-- Yandex Games SDK -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
</head>
<body>

<!-- Загрузочный экран -->
<div id="loading-screen">
    <div class="loader">
        <div class="spinner"></div>
        <p>Загрузка пазла...</p>
    </div>
</div>

<!-- Главное меню -->
<div id="menu-screen" class="screen hidden">
    <h1>🧩 ПАЗЛЫ</h1>
    <p class="subtitle">Собери все картинки!</p>
    <button id="btn-play" class="btn btn-primary">▶ Играть</button>
    <button id="btn-levels" class="btn btn-secondary">📋 Уровни</button>
    <button id="btn-sound" class="btn btn-icon">🔊</button>
</div>

<!-- Экран выбора уровня -->
<div id="levels-screen" class="screen hidden">
    <h2>Выбери уровень</h2>
    <div id="levels-grid" class="levels-grid"></div>
    <button id="btn-back-menu" class="btn btn-secondary">← Назад</button>
</div>

<!-- Игровой экран -->
<div id="game-screen" class="screen hidden">
    <div class="game-header">
        <button id="btn-back" class="btn btn-compact">←</button>
        <span id="level-title">Уровень 1</span>
        <span id="move-counter" class="info-badge">Ходы: 0</span>
        <span id="timer" class="info-badge">⏱ 00:00</span>
        <button id="btn-hint" class="btn btn-compact" title="Подсказка">👁</button>
        <button id="btn-shuffle" class="btn btn-compact" title="Перемешать">🔀</button>
    </div>

    <div class="game-body">
        <div class="puzzle-container">
            <div id="puzzle-board" class="puzzle-board"></div>
        </div>
    </div>

    <div id="hint-overlay" class="hint-overlay hidden">
        <img id="hint-img" src="" alt="Подсказка">
        <p>Отпустите, чтобы скрыть</p>
    </div>
</div>

<!-- Экран победы -->
<div id="win-screen" class="screen hidden">
    <div class="win-content">
        <h1>🎉 Победа!</h1>
        <img id="win-img" class="win-img" src="" alt="Собранная картинка">
        <div class="win-stats">
            <div class="stat">
                <span class="stat-value" id="win-moves">0</span>
                <span class="stat-label">Ходов</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="win-time">00:00</span>
                <span class="stat-label">Время</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="win-stars">⭐⭐⭐</span>
                <span class="stat-label">Рейтинг</span>
            </div>
        </div>
        <div class="win-buttons">
            <button id="btn-next-level" class="btn btn-compact btn-primary">Далее →</button>
            <button id="btn-win-menu" class="btn btn-compact btn-secondary">🏠 Меню</button>
        </div>
    </div>
</div>

<!-- Уведомления -->
<div id="toast" class="toast hidden"></div>

<script src="game.js"></script>
</body>
</html>
