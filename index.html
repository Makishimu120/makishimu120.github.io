<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Пазлы с Drag&Drop - Яндекс Игры</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 48px;
            padding: 20px;
            backdrop-filter: blur(10px);
            max-width: 900px;
            width: 100%;
        }

        .game-panel {
            background: white;
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
        }

        .level-badge {
            background: #ff6b6b;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .progress {
            background: rgba(0,0,0,0.3);
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
        }

        .puzzle-grid {
            display: grid;
            gap: 4px;
            background: #2c3e50;
            padding: 20px;
            border-radius: 24px;
            margin: 20px 0;
            justify-content: center;
            min-height: 400px;
        }

        .puzzle-tile {
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 12px;
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            aspect-ratio: 1 / 1;
            position: relative;
        }

        .puzzle-tile:active {
            cursor: grabbing;
        }

        .puzzle-tile.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .puzzle-tile.drag-over {
            transform: scale(0.95);
            box-shadow: 0 0 0 3px #ffd700, 0 0 0 6px #ffaa00;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 12px 28px;
            border-radius: 40px;
            font-family: inherit;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(2px);
        }

        .message {
            margin-top: 15px;
            font-weight: bold;
            background: #4ecdc4;
            padding: 10px 24px;
            border-radius: 40px;
            display: inline-block;
            color: white;
            font-size: 1rem;
        }

        .complexity-info {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
        }

        .image-status {
            margin-bottom: 15px;
            padding: 10px;
            background: #e8f4f8;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #2c3e50;
        }

        @media (max-width: 600px) {
            .game-panel {
                padding: 15px;
            }
            .puzzle-grid {
                gap: 2px;
                padding: 12px;
            }
            button {
                padding: 8px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="game-header">
            <div class="level-badge" id="levelDisplay">Уровень 1</div>
            <div class="progress">
                <span>🧩</span>
                <span id="levelCounter">0 / 0</span>
            </div>
        </div>

        <div id="imageStatus" class="image-status">
            📁 Загрузка картинок из папки images...
        </div>

        <div id="puzzleGrid" class="puzzle-grid"></div>

        <div class="controls">
            <button id="shuffleBtn">🔀 Перемешать</button>
            <button id="nextBtn">➡ Следующий уровень</button>
            <button id="resetBtn">🔄 Сброс</button>
        </div>
        
        <div id="message" class="message">✨ Перетаскивайте кусочки мышкой! ✨</div>
        <div class="complexity-info" id="complexityText"></div>
    </div>
</div>

<script>
    // =====================================================
    // ПАЗЛЫ С DRAG & DROP - РАБОТАЕТ С ПАПКОЙ images/
    // =====================================================
    
    class PuzzleGame {
        constructor() {
            this.images = [];
            this.currentLevel = 0;
            this.gridSize = 3;
            this.tiles = [];
            this.draggedIndex = null;
            this.levelCompleted = false;
            
            // DOM элементы
            this.gridContainer = document.getElementById('puzzleGrid');
            this.levelDisplay = document.getElementById('levelDisplay');
            this.levelCounter = document.getElementById('levelCounter');
            this.messageDiv = document.getElementById('message');
            this.complexityText = document.getElementById('complexityText');
            this.imageStatus = document.getElementById('imageStatus');
            
            // Кнопки
            document.getElementById('shuffleBtn').addEventListener('click', () => this.shuffle());
            document.getElementById('nextBtn').addEventListener('click', () => this.nextLevel());
            document.getElementById('resetBtn').addEventListener('click', () => this.reset());
            
            // Запуск
            this.init();
        }
        
        showMessage(text, isError = false) {
            this.messageDiv.textContent = text;
            this.messageDiv.style.background = isError ? '#e74c3c' : '#4ecdc4';
            setTimeout(() => {
                if (this.messageDiv.textContent === text) {
                    this.messageDiv.style.background = '#4ecdc4';
                }
            }, 2000);
        }
        
        async init() {
            this.showMessage('🔍 Загрузка картинок из папки images/...');
            await this.loadImagesFromFolder();
            
            if (this.images.length === 0) {
                this.imageStatus.innerHTML = '⚠️ Картинки не найдены! Создаю демо-уровни.<br>📌 Положите файлы 1.jpg, 2.jpg и т.д. в папку images/';
                this.createDemoImages();
            } else {
                this.imageStatus.innerHTML = `✅ Найдено картинок: ${this.images.length}<br>📁 Папка images/ (1.jpg, 2.jpg, ...)`;
            }
            
            if (this.images.length > 0) {
                this.levelCounter.textContent = `0 / ${this.images.length}`;
                await this.loadLevel(0);
            }
        }
        
        async loadImagesFromFolder() {
            // Пытаемся загрузить картинки из папки images/
            // Используем последовательную проверку существующих файлов
            const extensions = ['jpg', 'jpeg', 'png', 'webp'];
            const foundImages = [];
            
            for (let i = 1; i <= 20; i++) {
                let found = false;
                for (const ext of extensions) {
                    const url = `./images/${i}.${ext}`;
                    try {
                        // Используем Image объект для проверки загрузки (без CORS проблем)
                        const img = new Image();
                        await new Promise((resolve) => {
                            img.onload = () => {
                                found = true;
                                resolve(true);
                            };
                            img.onerror = () => resolve(false);
                            img.src = url;
                        });
                        
                        if (found) {
                            foundImages.push(url);
                            console.log(`Найдена: ${i}.${ext}`);
                            break;
                        }
                    } catch(e) {
                        console.log(`Ошибка проверки ${i}.${ext}`);
                    }
                }
                if (!found && foundImages.length > 0 && i > foundImages.length + 3) {
                    break;
                }
            }
            
            if (foundImages.length > 0) {
                this.images = foundImages;
                console.log('Загружено картинок:', this.images.length);
            }
        }
        
        createDemoImages() {
            // Создаём демо-картинки через canvas (работает без CORS)
            for (let i = 1; i <= 6; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 400;
                const ctx = canvas.getContext('2d');
                
                const gradient = ctx.createLinearGradient(0, 0, 400, 400);
                const hue = (i * 60) % 360;
                gradient.addColorStop(0, `hsl(${hue}, 70%, 60%)`);
                gradient.addColorStop(1, `hsl(${hue + 40}, 70%, 50%)`);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 400, 400);
                
                // Рисуем красивый узор
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(200, 200, 120, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(200, 200, 80, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 70px Arial';
                ctx.shadowBlur = 10;
                ctx.textAlign = 'center';
                ctx.fillText(`${i}`, 200, 240);
                ctx.font = '35px Arial';
                ctx.fillText('🧩', 200, 320);
                
                this.images.push(canvas.toDataURL());
            }
            this.showMessage('🎨 Демо-уровни созданы! Положите свои картинки в папку images/', false);
        }
        
        getDifficultyForLevel(level) {
            const difficulties = [3, 4, 4, 5, 5, 6, 6, 6, 6, 6];
            return level < difficulties.length ? difficulties[level] : 6;
        }
        
        async loadLevel(level) {
            if (level >= this.images.length) {
                this.showMessage('🏆 Поздравляем! Вы прошли все уровни! 🏆');
                return false;
            }
            
            this.currentLevel = level;
            this.levelCompleted = false;
            this.draggedIndex = null;
            
            this.gridSize = this.getDifficultyForLevel(level);
            const totalTiles = this.gridSize * this.gridSize;
            
            this.levelDisplay.textContent = `Уровень ${level + 1}`;
            this.levelCounter.textContent = `${level + 1} / ${this.images.length}`;
            this.complexityText.textContent = `📐 Сложность: ${this.gridSize}×${this.gridSize} (${totalTiles} фрагментов) | 💡 Перетаскивайте кусочки`;
            
            const imgUrl = this.images[level];
            
            // Создаём перемешанные тайлы
            this.tiles = Array.from({ length: totalTiles }, (_, i) => i);
            this.shuffleArray(this.tiles);
            
            await this.renderGrid(imgUrl);
            
            this.showMessage(`🎮 Уровень ${level + 1} | Соберите пазл перетаскиванием!`);
            return true;
        }
        
        shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        async renderGrid(imgUrl) {
            // Предзагрузка картинки
            const img = new Image();
            await new Promise((resolve) => {
                img.onload = resolve;
                img.onerror = resolve;
                img.src = imgUrl;
            });
            
            this.gridContainer.style.gridTemplateColumns = `repeat(${this.gridSize}, 1fr)`;
            this.gridContainer.style.gap = `${Math.max(2, 6 - Math.floor(this.gridSize / 2))}px`;
            this.gridContainer.innerHTML = '';
            
            const total = this.gridSize * this.gridSize;
            
            for (let i = 0; i < total; i++) {
                const tile = document.createElement('div');
                tile.className = 'puzzle-tile';
                tile.setAttribute('draggable', 'true');
                tile.setAttribute('data-index', i);
                
                tile.style.backgroundImage = `url('${imgUrl}')`;
                
                const fragmentId = this.tiles[i];
                const row = Math.floor(fragmentId / this.gridSize);
                const col = fragmentId % this.gridSize;
                
                tile.style.backgroundSize = `${this.gridSize * 100}% ${this.gridSize * 100}%`;
                const xPos = this.gridSize === 1 ? 0 : (col / (this.gridSize - 1)) * 100;
                const yPos = this.gridSize === 1 ? 0 : (row / (this.gridSize - 1)) * 100;
                tile.style.backgroundPosition = `${xPos}% ${yPos}%`;
                
                // Drag & Drop события
                tile.addEventListener('dragstart', (e) => this.onDragStart(e, i));
                tile.addEventListener('dragend', (e) => this.onDragEnd(e));
                tile.addEventListener('dragover', (e) => this.onDragOver(e, i));
                tile.addEventListener('dragleave', (e) => this.onDragLeave(e));
                tile.addEventListener('drop', (e) => this.onDrop(e, i));
                
                // Для touch устройств (мобильные)
                tile.addEventListener('touchstart', (e) => this.onTouchStart(e, i));
                tile.addEventListener('touchmove', (e) => this.onTouchMove(e));
                tile.addEventListener('touchend', (e) => this.onTouchEnd(e, i));
                
                this.gridContainer.appendChild(tile);
            }
        }
        
        updateTilesVisuals() {
            const imgUrl = this.images[this.currentLevel];
            const total = this.gridSize * this.gridSize;
            
            for (let i = 0; i < total; i++) {
                const tile = this.gridContainer.children[i];
                if (!tile) continue;
                
                const fragmentId = this.tiles[i];
                const row = Math.floor(fragmentId / this.gridSize);
                const col = fragmentId % this.gridSize;
                
                tile.style.backgroundImage = `url('${imgUrl}')`;
                tile.style.backgroundSize = `${this.gridSize * 100}% ${this.gridSize * 100}%`;
                const xPos = this.gridSize === 1 ? 0 : (col / (this.gridSize - 1)) * 100;
                const yPos = this.gridSize === 1 ? 0 : (row / (this.gridSize - 1)) * 100;
                tile.style.backgroundPosition = `${xPos}% ${yPos}%`;
            }
        }
        
        // Drag & Drop Handlers
        onDragStart(e, index) {
            if (this.levelCompleted) {
                e.preventDefault();
                return false;
            }
            this.draggedIndex = index;
            e.dataTransfer.setData('text/plain', index);
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        
        onDragEnd(e) {
            e.target.classList.remove('dragging');
            this.draggedIndex = null;
            // Убираем подсветку со всех элементов
            document.querySelectorAll('.puzzle-tile').forEach(tile => {
                tile.classList.remove('drag-over');
            });
        }
        
        onDragOver(e, index) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (!this.levelCompleted && this.draggedIndex !== null && this.draggedIndex !== index) {
                e.target.classList.add('drag-over');
            }
        }
        
        onDragLeave(e) {
            e.target.classList.remove('drag-over');
        }
        
        onDrop(e, targetIndex) {
            e.preventDefault();
            e.target.classList.remove('drag-over');
            
            if (this.levelCompleted) {
                this.showMessage('Уровень пройден! Перейдите к следующему', true);
                return;
            }
            
            const sourceIndex = this.draggedIndex;
            if (sourceIndex === null || sourceIndex === targetIndex) return;
            
            // Меняем местами
            [this.tiles[sourceIndex], this.tiles[targetIndex]] = [this.tiles[targetIndex], this.tiles[sourceIndex]];
            this.updateTilesVisuals();
            this.draggedIndex = null;
            
            this.checkVictory();
        }
        
        // Touch события для мобильных устройств
        onTouchStart(e, index) {
            if (this.levelCompleted) return;
            e.preventDefault();
            this.draggedIndex = index;
            e.target.style.opacity = '0.7';
        }
        
        onTouchMove(e) {
            if (this.draggedIndex === null) return;
            e.preventDefault();
            const touch = e.touches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            if (element && element.classList && element.classList.contains('puzzle-tile')) {
                document.querySelectorAll('.puzzle-tile').forEach(tile => {
                    tile.classList.remove('drag-over');
                });
                element.classList.add('drag-over');
            }
        }
        
        onTouchEnd(e, targetIndex) {
            if (this.draggedIndex === null) return;
            e.preventDefault();
            
            const sourceIndex = this.draggedIndex;
            
            // Сброс стилей
            document.querySelectorAll('.puzzle-tile').forEach(tile => {
                tile.classList.remove('drag-over');
                tile.style.opacity = '1';
            });
            
            if (sourceIndex !== targetIndex && !this.levelCompleted) {
                [this.tiles[sourceIndex], this.tiles[targetIndex]] = [this.tiles[targetIndex], this.tiles[sourceIndex]];
                this.updateTilesVisuals();
                this.checkVictory();
            }
            
            this.draggedIndex = null;
        }
        
        checkVictory() {
            const total = this.gridSize * this.gridSize;
            let isComplete = true;
            
            for (let i = 0; i < total; i++) {
                if (this.tiles[i] !== i) {
                    isComplete = false;
                    break;
                }
            }
            
            if (isComplete && !this.levelCompleted) {
                this.levelCompleted = true;
                this.showMessage(`🎉 Уровень ${this.currentLevel + 1} пройден! 🎉`);
                
                if (this.currentLevel + 1 < this.images.length) {
                    setTimeout(() => {
                        this.nextLevel();
                    }, 1500);
                } else {
                    this.showMessage('🏆 ПОБЕДА! Вы прошли ВСЕ уровни! 🏆');
                }
            }
        }
        
        shuffle() {
            if (this.levelCompleted) {
                this.showMessage('Сначала перейдите на следующий уровень', true);
                return;
            }
            
            const total = this.gridSize * this.gridSize;
            this.shuffleArray(this.tiles);
            this.updateTilesVisuals();
            this.draggedIndex = null;
            this.showMessage('🔀 Пазл перемешан!');
        }
        
        reset() {
            this.levelCompleted = false;
            const total = this.gridSize * this.gridSize;
            this.tiles = Array.from({ length: total }, (_, i) => i);
            this.shuffleArray(this.tiles);
            this.updateTilesVisuals();
            this.draggedIndex = null;
            this.showMessage('🔄 Уровень сброшен');
        }
        
        nextLevel() {
            if (!this.levelCompleted && !this.isLevelComplete()) {
                this.showMessage('Сначала соберите текущий пазл!', true);
                return;
            }
            
            if (this.currentLevel + 1 < this.images.length) {
                this.loadLevel(this.currentLevel + 1);
            } else {
                this.showMessage('🎉 Это последний уровень! Вы великолепны! 🎉');
            }
        }
        
        isLevelComplete() {
            const total = this.gridSize * this.gridSize;
            for (let i = 0; i < total; i++) {
                if (this.tiles[i] !== i) return false;
            }
            return true;
        }
    }
    
    // Запуск игры
    window.addEventListener('load', () => {
        new PuzzleGame();
    });
</script>
</body>
</html>
