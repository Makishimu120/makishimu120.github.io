<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Пазлы - Яндекс Игры | Touch support</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 12px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 48px;
            padding: 12px;
            backdrop-filter: blur(8px);
            max-width: 600px;
            width: 100%;
            margin: auto;
        }

        .game-panel {
            background: #fef7e0;
            border-radius: 36px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 18px;
            border-radius: 50px;
            color: white;
        }

        .level-badge {
            background: #ff6b6b;
            padding: 5px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
        }

        .progress {
            background: rgba(0,0,0,0.3);
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .image-status {
            background: #e8f4f8;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 12px;
            color: #2c3e50;
        }

        .puzzle-grid {
            display: grid;
            gap: 3px;
            background: #2c3e50;
            padding: 12px;
            border-radius: 24px;
            margin: 12px 0;
            justify-content: center;
            touch-action: none;
        }

        .puzzle-tile {
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 10px;
            touch-action: none;
            cursor: pointer;
            transition: transform 0.08s linear, box-shadow 0.1s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            aspect-ratio: 1 / 1;
            -webkit-tap-highlight-color: transparent;
        }

        .puzzle-tile:active {
            transform: scale(0.97);
        }

        .puzzle-tile.dragging {
            opacity: 0.6;
            transform: scale(0.95);
        }

        .puzzle-tile.drag-over {
            transform: scale(0.95);
            box-shadow: 0 0 0 3px #ffd700, 0 0 0 6px #ffaa00;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 10px 18px;
            border-radius: 40px;
            font-family: inherit;
            cursor: pointer;
            color: white;
            transition: transform 0.08s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(2px);
        }

        .message {
            margin-top: 14px;
            font-weight: bold;
            background: #4ecdc4;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            color: white;
            font-size: 0.85rem;
        }

        .complexity-info {
            margin-top: 10px;
            font-size: 0.7rem;
            color: #666;
            font-weight: 500;
        }

        /* Адаптация для очень узких экранов */
        @media (max-width: 500px) {
            body {
                padding: 8px;
            }
            .game-panel {
                padding: 12px;
            }
            .puzzle-grid {
                gap: 2px;
                padding: 8px;
            }
            button {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .level-badge {
                font-size: 0.85rem;
                padding: 4px 12px;
            }
            .progress {
                font-size: 0.8rem;
            }
        }

        /* Для очень маленьких экранов (iPhone SE и подобные) */
        @media (max-width: 380px) {
            .controls {
                gap: 6px;
            }
            button {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            .message {
                font-size: 0.75rem;
                padding: 6px 12px;
            }
        }

        /* Альбомная ориентация */
        @media (orientation: landscape) and (max-height: 500px) {
            .game-container {
                padding: 6px;
            }
            .game-panel {
                padding: 8px;
            }
            .puzzle-grid {
                max-height: 50vh;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="game-header">
            <div class="level-badge" id="levelDisplay">Уровень 1</div>
            <div class="progress">
                <span>🧩</span>
                <span id="levelCounter">0 / 0</span>
            </div>
        </div>

        <div id="imageStatus" class="image-status">
            📁 Загрузка картинок...
        </div>

        <div id="puzzleGrid" class="puzzle-grid"></div>

        <div class="controls">
            <button id="shuffleBtn">🔀 Перемешать</button>
            <button id="nextBtn">➡ Следующий</button>
            <button id="resetBtn">🔄 Сброс</button>
        </div>
        
        <div id="message" class="message">👆 Нажмите и перетащите плитку пальцем</div>
        <div class="complexity-info" id="complexityText"></div>
    </div>
</div>

<script>
    // =====================================================
    // ПАЗЛЫ ДЛЯ СМАРТФОНОВ - ПОДДЕРЖКА ТАЧЕЙ
    // Drag & drop пальцем, картинки из папки images/
    // =====================================================
    
    class PuzzleGame {
        constructor() {
            this.images = [];
            this.currentLevel = 0;
            this.gridSize = 3;
            this.tiles = [];
            this.draggedIndex = null;
            this.levelCompleted = false;
            this.touchStartX = 0;
            this.touchStartY = 0;
            
            // DOM элементы
            this.gridContainer = document.getElementById('puzzleGrid');
            this.levelDisplay = document.getElementById('levelDisplay');
            this.levelCounter = document.getElementById('levelCounter');
            this.messageDiv = document.getElementById('message');
            this.complexityText = document.getElementById('complexityText');
            this.imageStatus = document.getElementById('imageStatus');
            
            // Кнопки
            document.getElementById('shuffleBtn').addEventListener('click', () => this.shuffle());
            document.getElementById('nextBtn').addEventListener('click', () => this.nextLevel());
            document.getElementById('resetBtn').addEventListener('click', () => this.reset());
            
            // Запрещаем скролл при таче на гриде
            this.gridContainer.addEventListener('touchmove', (e) => {
                if (this.draggedIndex !== null) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            this.init();
        }
        
        showMessage(text, isError = false) {
            this.messageDiv.textContent = text;
            this.messageDiv.style.background = isError ? '#e74c3c' : '#4ecdc4';
            setTimeout(() => {
                if (this.messageDiv.textContent === text) {
                    this.messageDiv.style.background = '#4ecdc4';
                }
            }, 2000);
        }
        
        async init() {
            this.showMessage('🔍 Поиск картинок в папке images/...');
            await this.loadImagesFromFolder();
            
            if (this.images.length === 0) {
                this.imageStatus.innerHTML = '⚠️ Картинки не найдены!<br>📌 Положите файлы 1.jpg, 2.jpg и т.д. в папку images/';
                this.createDemoImages();
            } else {
                this.imageStatus.innerHTML = `✅ Найдено картинок: ${this.images.length}<br>📁 Папка images/ (1.jpg, 2.jpg, ...)`;
            }
            
            if (this.images.length > 0) {
                this.levelCounter.textContent = `0 / ${this.images.length}`;
                await this.loadLevel(0);
            }
        }
        
        async loadImagesFromFolder() {
            const extensions = ['jpg', 'jpeg', 'png', 'webp'];
            const foundImages = [];
            
            for (let i = 1; i <= 20; i++) {
                let found = false;
                for (const ext of extensions) {
                    const url = `./images/${i}.${ext}`;
                    try {
                        const img = new Image();
                        await new Promise((resolve) => {
                            img.onload = () => {
                                found = true;
                                resolve(true);
                            };
                            img.onerror = () => resolve(false);
                            img.src = url;
                        });
                        
                        if (found) {
                            foundImages.push(url);
                            break;
                        }
                    } catch(e) {}
                }
                if (!found && foundImages.length > 0 && i > foundImages.length + 3) {
                    break;
                }
            }
            
            if (foundImages.length > 0) {
                this.images = foundImages;
            }
        }
        
        createDemoImages() {
            for (let i = 1; i <= 6; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 400;
                const ctx = canvas.getContext('2d');
                
                const gradient = ctx.createLinearGradient(0, 0, 400, 400);
                const hue = (i * 60) % 360;
                gradient.addColorStop(0, `hsl(${hue}, 70%, 60%)`);
                gradient.addColorStop(1, `hsl(${hue + 40}, 70%, 50%)`);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 400, 400);
                
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(200, 200, 120, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(200, 200, 80, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 70px Arial';
                ctx.shadowBlur = 10;
                ctx.textAlign = 'center';
                ctx.fillText(`${i}`, 200, 240);
                ctx.font = '35px Arial';
                ctx.fillText('🧩', 200, 320);
                
                this.images.push(canvas.toDataURL());
            }
            this.showMessage('🎨 Демо-уровни готовы!', false);
        }
        
        getDifficultyForLevel(level) {
            const difficulties = [3, 4, 4, 5, 5, 6, 6, 6, 6, 6];
            return level < difficulties.length ? difficulties[level] : 6;
        }
        
        async loadLevel(level) {
            if (level >= this.images.length) {
                this.showMessage('🏆 Вы прошли все уровни! 🏆');
                return false;
            }
            
            this.currentLevel = level;
            this.levelCompleted = false;
            this.draggedIndex = null;
            
            this.gridSize = this.getDifficultyForLevel(level);
            const totalTiles = this.gridSize * this.gridSize;
            
            this.levelDisplay.textContent = `Уровень ${level + 1}`;
            this.levelCounter.textContent = `${level + 1} / ${this.images.length}`;
            this.complexityText.textContent = `📐 ${this.gridSize}×${this.gridSize} (${totalTiles} фрагментов) | 👆 Перетащите пальцем`;
            
            const imgUrl = this.images[level];
            
            this.tiles = Array.from({ length: totalTiles }, (_, i) => i);
            this.shuffleArray(this.tiles);
            
            await this.renderGrid(imgUrl);
            
            this.showMessage(`🎮 Уровень ${level + 1} | Собирайте пазл!`);
            return true;
        }
        
        shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        async renderGrid(imgUrl) {
            const img = new Image();
            await new Promise((resolve) => {
                img.onload = resolve;
                img.onerror = resolve;
                img.src = imgUrl;
            });
            
            // Адаптивный размер ячейки
            const containerWidth = this.gridContainer.clientWidth;
            const tileSize = Math.min(120, containerWidth / this.gridSize - 4);
            
            this.gridContainer.style.gridTemplateColumns = `repeat(${this.gridSize}, 1fr)`;
            this.gridContainer.style.gap = `${Math.max(2, 4 - Math.floor(this.gridSize / 3))}px`;
            this.gridContainer.innerHTML = '';
            
            const total = this.gridSize * this.gridSize;
            
            for (let i = 0; i < total; i++) {
                const tile = document.createElement('div');
                tile.className = 'puzzle-tile';
                tile.setAttribute('data-index', i);
                
                tile.style.backgroundImage = `url('${imgUrl}')`;
                this.updateTileBackground(tile, this.tiles[i]);
                
                // Mouse события (для ПК)
                tile.addEventListener('dragstart', (e) => {
                    e.preventDefault();
                    return false;
                });
                tile.addEventListener('mousedown', (e) => this.onMouseDown(e, i));
                
                // Touch события для смартфонов
                tile.addEventListener('touchstart', (e) => this.onTouchStart(e, i), { passive: false });
                tile.addEventListener('touchmove', (e) => this.onTouchMove(e), { passive: false });
                tile.addEventListener('touchend', (e) => this.onTouchEnd(e));
                
                this.gridContainer.appendChild(tile);
            }
        }
        
        updateTileBackground(tile, fragmentId) {
            const imgUrl = this.images[this.currentLevel];
            const row = Math.floor(fragmentId / this.gridSize);
            const col = fragmentId % this.gridSize;
            
            tile.style.backgroundImage = `url('${imgUrl}')`;
            tile.style.backgroundSize = `${this.gridSize * 100}% ${this.gridSize * 100}%`;
            const xPos = this.gridSize === 1 ? 0 : (col / (this.gridSize - 1)) * 100;
            const yPos = this.gridSize === 1 ? 0 : (row / (this.gridSize - 1)) * 100;
            tile.style.backgroundPosition = `${xPos}% ${yPos}%`;
        }
        
        updateAllTiles() {
            const total = this.gridSize * this.gridSize;
            for (let i = 0; i < total; i++) {
                const tile = this.gridContainer.children[i];
                if (tile) {
                    this.updateTileBackground(tile, this.tiles[i]);
                }
            }
        }
        
        // Mouse поддержка для ПК
        onMouseDown(e, index) {
            if (this.levelCompleted) return;
            e.preventDefault();
            this.draggedIndex = index;
            e.target.classList.add('dragging');
            
            const onMouseUp = (upEvent) => {
                const targetElement = document.elementFromPoint(upEvent.clientX, upEvent.clientY);
                let targetIndex = null;
                if (targetElement && targetElement.classList && targetElement.classList.contains('puzzle-tile')) {
                    targetIndex = parseInt(targetElement.getAttribute('data-index'));
                }
                
                if (targetIndex !== null && targetIndex !== this.draggedIndex && !this.levelCompleted) {
                    [this.tiles[this.draggedIndex], this.tiles[targetIndex]] = 
                    [this.tiles[targetIndex], this.tiles[this.draggedIndex]];
                    this.updateAllTiles();
                    this.checkVictory();
                }
                
                e.target.classList.remove('dragging');
                this.draggedIndex = null;
                document.removeEventListener('mouseup', onMouseUp);
            };
            
            document.addEventListener('mouseup', onMouseUp);
        }
        
        // Touch события для смартфонов (основное)
        onTouchStart(e, index) {
            if (this.levelCompleted) {
                e.preventDefault();
                return;
            }
            e.preventDefault();
            this.draggedIndex = index;
            const touch = e.touches[0];
            this.touchStartX = touch.clientX;
            this.touchStartY = touch.clientY;
            
            const tile = e.target;
            tile.classList.add('dragging');
        }
        
        onTouchMove(e) {
            if (this.draggedIndex === null) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            
            // Убираем подсветку со всех
            document.querySelectorAll('.puzzle-tile').forEach(tile => {
                tile.classList.remove('drag-over');
            });
            
            if (element && element.classList && element.classList.contains('puzzle-tile')) {
                element.classList.add('drag-over');
            }
        }
        
        onTouchEnd(e) {
            if (this.draggedIndex === null) {
                e.preventDefault();
                return;
            }
            e.preventDefault();
            
            // Находим элемент под пальцем
            const touch = e.changedTouches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            
            let targetIndex = null;
            if (element && element.classList && element.classList.contains('puzzle-tile')) {
                targetIndex = parseInt(element.getAttribute('data-index'));
            }
            
            // Снимаем подсветку
            document.querySelectorAll('.puzzle-tile').forEach(tile => {
                tile.classList.remove('drag-over');
                tile.classList.remove('dragging');
            });
            
            // Обмен плиток
            if (targetIndex !== null && targetIndex !== this.draggedIndex && !this.levelCompleted) {
                [this.tiles[this.draggedIndex], this.tiles[targetIndex]] = 
                [this.tiles[targetIndex], this.tiles[this.draggedIndex]];
                this.updateAllTiles();
                this.checkVictory();
                
                // Виброотклик (если поддерживается)
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
            }
            
            this.draggedIndex = null;
        }
        
        checkVictory() {
            const total = this.gridSize * this.gridSize;
            let isComplete = true;
            
            for (let i = 0; i < total; i++) {
                if (this.tiles[i] !== i) {
                    isComplete = false;
                    break;
                }
            }
            
            if (isComplete && !this.levelCompleted) {
                this.levelCompleted = true;
                this.showMessage(`🎉 Уровень ${this.currentLevel + 1} пройден! 🎉`);
                
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100]);
                }
                
                if (this.currentLevel + 1 < this.images.length) {
                    setTimeout(() => {
                        this.nextLevel();
                    }, 1500);
                } else {
                    this.showMessage('🏆 ПОБЕДА! Все уровни пройдены! 🏆');
                }
            }
        }
        
        shuffle() {
            if (this.levelCompleted) {
                this.showMessage('Уровень пройден! Перейдите на следующий', true);
                return;
            }
            
            const total = this.gridSize * this.gridSize;
            this.shuffleArray(this.tiles);
            this.updateAllTiles();
            this.draggedIndex = null;
            this.showMessage('🔀 Пазл перемешан!');
            
            if (navigator.vibrate) {
                navigator.vibrate(30);
            }
        }
        
        reset() {
            this.levelCompleted = false;
            const total = this.gridSize * this.gridSize;
            this.tiles = Array.from({ length: total }, (_, i) => i);
            this.shuffleArray(this.tiles);
            this.updateAllTiles();
            this.draggedIndex = null;
            this.showMessage('🔄 Уровень сброшен');
        }
        
        nextLevel() {
            if (!this.levelCompleted && !this.isLevelComplete()) {
                this.showMessage('Сначала соберите текущий пазл!', true);
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
                return;
            }
            
            if (this.currentLevel + 1 < this.images.length) {
                this.loadLevel(this.currentLevel + 1);
            } else {
                this.showMessage('🎉 Это финал! Вы великолепны! 🎉');
            }
        }
        
        isLevelComplete() {
            const total = this.gridSize * this.gridSize;
            for (let i = 0; i < total; i++) {
                if (this.tiles[i] !== i) return false;
            }
            return true;
        }
    }
    
    // Запуск игры
    window.addEventListener('load', () => {
        new PuzzleGame();
    });
</script>
</body>
</html>
